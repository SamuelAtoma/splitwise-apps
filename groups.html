<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPLITWI$E - Groups & Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a1f2e;
      color: #e0f7f7;
      min-height: 100vh;
      display: flex;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 31, 46, 0.92);
      backdrop-filter: blur(10px);
      padding: 1.2rem 5%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(32, 192, 192, 0.12);
    }

    .logo {
      font-size: 1.9rem;
      font-weight: 700;
      color: #20c0c0;
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .back-btn, .logout-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e0f7f7;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      text-decoration: none;
    }

    .back-btn:hover, .logout-btn:hover {
      background: rgba(32,192,192,0.18);
      border-color: rgba(32,192,192,0.4);
      color: #20c0c0;
    }

    .main-container {
      display: flex;
      margin-top: 80px;
      width: 100%;
      height: calc(100vh - 80px);
    }

    .groups-sidebar {
      width: 300px;
      background: rgba(10, 31, 46, 0.5);
      border-right: 1px solid rgba(32, 192, 192, 0.12);
      padding: 1.5rem;
      overflow-y: auto;
    }

    .groups-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #20c0c0;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(32, 192, 192, 0.2);
      padding-bottom: 1rem;
    }

    .group-item {
      background: rgba(32, 192, 192, 0.08);
      border: 1px solid rgba(32, 192, 192, 0.15);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .group-item:hover {
      background: rgba(32, 192, 192, 0.15);
      border-color: rgba(32, 192, 192, 0.3);
      transform: translateX(5px);
    }

    .group-item.active {
      background: rgba(32, 192, 192, 0.2);
      border-color: #20c0c0;
    }

    .group-item-name {
      font-weight: 600;
      color: #e0f7f7;
      margin-bottom: 0.3rem;
    }

    .group-item-members {
      font-size: 0.8rem;
      color: #a0d0d0;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(10, 31, 46, 0.3);
    }

    .chat-header {
      background: rgba(10, 31, 46, 0.7);
      border-bottom: 1px solid rgba(32, 192, 192, 0.12);
      padding: 1.5rem 2rem;
    }

    .chat-header-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #20c0c0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      gap: 1rem;
      animation: slideIn 0.3s ease;
    }

    .message.user {
      justify-content: flex-end;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #20c0c0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
      font-size: 0.9rem;
    }

    .message-content {
      max-width: 60%;
    }

    .message-bubble {
      background: rgba(32, 192, 192, 0.15);
      border: 1px solid rgba(32, 192, 192, 0.2);
      border-radius: 12px;
      padding: 1rem;
      word-wrap: break-word;
    }

    .message.user .message-bubble {
      background: rgba(32, 192, 192, 0.3);
      border-color: #20c0c0;
    }

    .message.bot .message-avatar {
      background: #4caf50;
    }

    .message.bot .message-bubble {
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .message-name {
      font-size: 0.85rem;
      color: #b0e0e0;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }

    .message-text {
      color: #e0f7f7;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.bot .message-text {
      color: #90EE90;
    }

    .chat-input-area {
      background: rgba(10, 31, 46, 0.7);
      border-top: 1px solid rgba(32, 192, 192, 0.12);
      padding: 1.5rem 2rem;
      display: flex;
      gap: 1rem;
    }

    .chat-input {
      flex: 1;
      padding: 1rem;
      background: rgba(32, 192, 192, 0.08);
      border: 1px solid rgba(32, 192, 192, 0.2);
      border-radius: 10px;
      color: #e0f7f7;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
    }

    .chat-input:focus {
      outline: none;
      border-color: #20c0c0;
      box-shadow: 0 0 0 3px rgba(32,192,192,0.1);
    }

    .send-btn {
      background: #20c0c0;
      color: white;
      border: none;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s;
    }

    .send-btn:hover {
      background: #18a8a8;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .no-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: #a0d0d0;
    }

    .no-group-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(32, 192, 192, 0.3);
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }

      .groups-sidebar {
        width: 100%;
        max-height: 200px;
        border-bottom: 1px solid rgba(32, 192, 192, 0.12);
      }

      .message-content {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="location.js"></script>

  <header>
    <div class="logo">SPLITWI$E Groups & Chat</div>
    <div class="header-actions">
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </div>
  </header>

  <div class="main-container">
    <div class="groups-sidebar">
      <div class="groups-title">👥 My Groups</div>
      <div id="groups-list"></div>
    </div>

    <div class="chat-area">
      <div id="no-group" class="no-group">
        <div class="no-group-icon">💬</div>
        <div class="no-group-text">Select a group to chat</div>
        <div style="font-size: 0.9rem; margin-top: 1rem; color: #a0d0d0;">Create one from the Live Map</div>
      </div>

      <div id="chat-container" style="display: none; flex: 1; display: flex; flex-direction: column;">
        <div class="chat-header">
          <div class="chat-header-title" id="current-group-name">Group</div>
        </div>
        <div class="chat-messages" id="messages-container"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="message-input" placeholder="Type a message...">
          <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let currentGroupId = null;
    let groups = [];
    let messages = {};

    async function checkUserLoggedIn() {
      const user = await window.checkAuth();
      if (!user) {
        window.location.href = 'login.html';
        return null;
      }
      return user;
    }

    async function loadGroups() {
      try {
        const { data: groupMembers, error: membersError } = await window.supabase
          .from('group_members')
          .select('group_id')
          .eq('member_id', currentUser.id);

        if (membersError) {
          console.error('Members error:', membersError);
          return;
        }

        if (!groupMembers || groupMembers.length === 0) {
          document.getElementById('groups-list').innerHTML = '<p style="color: #a0d0d0; text-align: center; padding: 2rem;">No groups yet</p>';
          return;
        }

        const groupIds = groupMembers.map(gm => gm.group_id);

        const { data: groupsData, error: groupsError } = await window.supabase
          .from('groups')
          .select('id, group_name, created_at')
          .in('id', groupIds)
          .order('created_at', { ascending: false });

        if (groupsError) {
          console.error('Groups error:', groupsError);
          return;
        }

        groups = groupsData || [];
        renderGroups();

        if (groups.length > 0 && !currentGroupId) {
          selectGroup(groups[0].id, groups[0].group_name);
        }
      } catch (error) {
        console.error('Load groups error:', error);
      }
    }

    function renderGroups() {
      const container = document.getElementById('groups-list');
      container.innerHTML = '';

      groups.forEach(group => {
        const groupEl = document.createElement('div');
        groupEl.className = `group-item ${group.id === currentGroupId ? 'active' : ''}`;
        groupEl.onclick = () => selectGroup(group.id, group.group_name);
        groupEl.innerHTML = `<div class="group-item-name">${group.group_name}</div><div class="group-item-members">Active</div>`;
        container.appendChild(groupEl);
      });
    }

    async function selectGroup(groupId, groupName) {
      currentGroupId = groupId;
      document.getElementById('no-group').style.display = 'none';
      document.getElementById('chat-container').style.display = 'flex';
      document.getElementById('current-group-name').textContent = groupName;
      renderGroups();
      await loadGroupMessages();
    }

    async function loadGroupMessages() {
      try {
        const { data: msgs, error } = await window.supabase
          .from('messages')
          .select('id, group_id, user_id, user_name, message, is_bot, created_at')
          .eq('group_id', currentGroupId)
          .order('created_at', { ascending: true });

        if (error) {
          console.error('Messages error:', error);
          return;
        }

        messages[currentGroupId] = msgs || [];
        renderMessages();

        if (messages[currentGroupId].length === 0) {
          await addBotMessage("Hello! 👋 I'm SPLITWISE Bot. How can I help?");
        }
      } catch (error) {
        console.error('Load messages error:', error);
      }
    }

    function renderMessages() {
      const container = document.getElementById('messages-container');
      container.innerHTML = '';
      const msgs = messages[currentGroupId] || [];

      msgs.forEach(msg => {
        const messageEl = document.createElement('div');
        messageEl.className = `message ${msg.is_bot ? 'bot' : msg.user_id === currentUser.id ? 'user' : ''}`;
        const initials = msg.is_bot ? '🤖' : (msg.user_name ? msg.user_name.charAt(0).toUpperCase() : 'U');

        messageEl.innerHTML = `
          <div class="message-avatar">${initials}</div>
          <div class="message-content">
            <div class="message-name">${msg.user_name || 'Bot'}</div>
            <div class="message-bubble">
              <div class="message-text">${msg.message}</div>
            </div>
          </div>
        `;

        container.appendChild(messageEl);
      });

      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const message = input.value.trim();

      if (!message || !currentGroupId) return;

      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;

      try {
        const { error } = await window.supabase
          .from('messages')
          .insert({
            group_id: currentGroupId,
            user_id: currentUser.id,
            user_name: currentUser.full_name,
            message: message,
            is_bot: false
          });

        if (error) throw error;

        input.value = '';
        await loadGroupMessages();

        setTimeout(() => {
          addBotMessage("Got it! Thanks for sharing 😊");
        }, 500);
      } catch (error) {
        console.error('Send error:', error);
        alert('Error: ' + error.message);
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function addBotMessage(text) {
      try {
        await window.supabase
          .from('messages')
          .insert({
            group_id: currentGroupId,
            user_id: null,
            user_name: 'SPLITWISE Bot',
            message: text,
            is_bot: true
          });

        await loadGroupMessages();
      } catch (error) {
        console.error('Bot message error:', error);
      }
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      const result = await window.signOut();
      if (result.success) window.location.href = 'login.html';
    });

    document.getElementById('message-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    async function initialize() {
      const user = await checkUserLoggedIn();
      if (!user) return;

      const { data: profile, error } = await window.supabase
        .from('user_profiles')
        .select('id, full_name')
        .eq('id', user.id)
        .single();

      if (error) {
        console.error('Profile error:', error);
        return;
      }

      currentUser = profile;
      await loadGroups();

      setInterval(() => {
        if (currentGroupId) loadGroupMessages();
      }, 3000);
    }

    initialize();
  </script>
</body>
</html>
