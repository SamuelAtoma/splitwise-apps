<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPLITWI$E - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a1f2e;
      color: #e0f7f7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url('https://thumbs.dreamstime.com/b/dark-street-map-13222168.jpg');
      background-size: cover;
      background-position: center;
      filter: blur(8px) brightness(0.65) contrast(1.15);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 31, 46, 0.58);
      z-index: -1;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(10, 31, 46, 0.92);
      backdrop-filter: blur(10px);
      padding: 1.2rem 5%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(32, 192, 192, 0.12);
    }

    .logo {
      font-size: 1.9rem;
      font-weight: 700;
      color: #20c0c0;
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .back-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e0f7f7;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(32,192,192,0.18);
      border-color: rgba(32,192,192,0.4);
      color: #20c0c0;
    }

    .logout-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e0f7f7;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
    }

    .logout-btn:hover {
      background: rgba(255,80,80,0.18);
      border-color: rgba(255,80,80,0.4);
      color: #ffcccc;
    }

    main {
      padding: 2.5rem 5% 4rem 5%;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.8rem;
      color: #20c0c0;
      margin-bottom: 0.6rem;
      font-weight: 700;
    }

    .page-subtitle {
      font-size: 1.15rem;
      color: #a0d0d0;
      margin-bottom: 2.5rem;
    }

    .panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .panel-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #20c0c0;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(32,192,192,0.2);
      padding-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #b0e0e0;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input, textarea {
      width: 100%;
      padding: 1rem;
      border: 1px solid rgba(32,192,192,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: #e0f7f7;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      transition: border 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #20c0c0;
      box-shadow: 0 0 0 3px rgba(32,192,192,0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .btn {
      background: #20c0c0;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
    }

    .btn:hover {
      background: #18a8a8;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #20c0c0;
      color: #20c0c0;
      margin-left: 1rem;
    }

    .btn-secondary:hover {
      background: #20c0c0;
      color: white;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .avatar-section {
      display: flex;
      gap: 2rem;
      align-items: center;
      margin-bottom: 2rem;
    }

    .avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #20c0c0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 2rem;
      border: 4px solid rgba(32,192,192,0.3);
    }

    .avatar-info h2 {
      color: #e0f7f7;
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
    }

    .avatar-info p {
      color: #a0d0d0;
      margin: 0;
    }

    .message {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      display: none;
    }

    .message.success {
      background: rgba(76, 175, 80, 0.2);
      color: #90EE90;
      border: 1px solid #90EE90;
      display: block;
    }

    .message.error {
      background: rgba(255, 67, 67, 0.2);
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #a0d0d0;
    }

    .stat-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .stat-item {
      background: rgba(32,192,192,0.08);
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(32,192,192,0.15);
    }

    .stat-label {
      color: #a0d0d0;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #20c0c0;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .form-row { grid-template-columns: 1fr; }
      .avatar-section { flex-direction: column; text-align: center; }
      .button-group { flex-direction: column; }
      .btn-secondary { margin-left: 0; }
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="location.js"></script>

  <div class="background"></div>
  <div class="overlay"></div>

  <header>
    <div class="logo">SPLITWI$E</div>
    <div class="header-actions">
      <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </div>
  </header>

  <main>
    <h1>Profile Settings</h1>
    <p class="page-subtitle">Manage your SPLITWISE account</p>

    <!-- Profile Panel -->
    <div class="panel">
      <div class="panel-title">Personal Information</div>
      
      <div class="avatar-section">
        <div class="avatar-large" id="avatar-large">--</div>
        <div class="avatar-info">
          <h2 id="profile-name">Loading...</h2>
          <p id="profile-email">user@example.com</p>
          <p id="profile-phone" style="color: #b0e0e0; margin-top: 0.5rem;"></p>
        </div>
      </div>

      <form id="profile-form">
        <div class="form-row">
          <div class="form-group">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" readonly>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="+234 XXX XXXX XXXX">
          </div>
          <div class="form-group">
            <label for="location-name">Location</label>
            <input type="text" id="location-name" placeholder="City, State" readonly>
          </div>
        </div>

        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" placeholder="Tell others about yourself..."></textarea>
        </div>

        <div class="button-group">
          <button type="submit" class="btn" id="save-btn">Save Changes</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
        </div>

        <div id="profile-message" class="message"></div>
      </form>
    </div>

    <!-- Statistics Panel -->
    <div class="panel">
      <div class="panel-title">Account Statistics</div>
      
      <div class="stat-section">
        <div class="stat-item">
          <div class="stat-label">Total Groups</div>
          <div class="stat-value" id="stat-groups">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">You Are Owed</div>
          <div class="stat-value" id="stat-owed">₦0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">You Owe</div>
          <div class="stat-value" id="stat-owing">₦0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Joined Date</div>
          <div class="stat-value" id="stat-joined">--</div>
        </div>
      </div>
    </div>

    <!-- Account Security Panel -->
    <div class="panel">
      <div class="panel-title">Account Security</div>
      
      <div class="form-group">
        <label for="new-password">Change Password</label>
        <input type="password" id="new-password" placeholder="New password (min 8 characters)">
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password">
      </div>

      <button type="button" class="btn" id="change-password-btn">Update Password</button>
      <div id="password-message" class="message"></div>
    </div>

    <!-- Danger Zone -->
    <div class="panel" style="border-color: rgba(255,80,80,0.2);">
      <div class="panel-title" style="color: #ff6b6b; border-color: rgba(255,80,80,0.2);">Danger Zone</div>
      
      <p style="color: #a0d0d0; margin-bottom: 1.5rem;">
        These actions cannot be undone. Please be careful.
      </p>

      <button type="button" class="btn" id="delete-account-btn" style="background: #ff6b6b;">
        Delete Account
      </button>
      <div id="delete-message" class="message"></div>
    </div>
  </main>

  <script>
    // Check if user is logged in
    async function checkUserLoggedIn() {
      const user = await window.checkAuth();
      if (!user) {
        window.location.href = 'login.html';
        return null;
      }
      return user;
    }

    // Load user profile
    async function loadProfile() {
      const user = await checkUserLoggedIn();
      if (!user) return;

      try {
        const { data: profile, error } = await window.supabase
          .from('user_profiles')
          .select('*')
          .eq('id', user.id)
          .single();

        if (error) {
          console.error('Error fetching profile:', error);
          return;
        }

        // Update UI with profile data
        const fullName = profile.full_name || 'User';
        const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

        document.getElementById('avatar-large').textContent = initials;
        document.getElementById('profile-name').textContent = fullName;
        document.getElementById('profile-email').textContent = profile.email;
        document.getElementById('email').value = profile.email;
        document.getElementById('full-name').value = fullName;
        document.getElementById('phone').value = profile.phone_number || '';
        document.getElementById('bio').value = profile.bio || '';

        // Format joined date
        if (profile.created_at) {
          const joinedDate = new Date(profile.created_at).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
          document.getElementById('stat-joined').textContent = joinedDate;
        }

      } catch (error) {
        console.error('Error loading profile:', error);
      }
    }

    // Save profile changes
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const user = await window.checkAuth();
      if (!user) return;

      const fullName = document.getElementById('full-name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const bio = document.getElementById('bio').value.trim();
      const messageDiv = document.getElementById('profile-message');

      if (!fullName) {
        messageDiv.textContent = 'Please enter your full name';
        messageDiv.className = 'message error';
        return;
      }

      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const { error } = await window.supabase
          .from('user_profiles')
          .update({
            full_name: fullName,
            phone_number: phone,
            bio: bio,
            updated_at: new Date().toISOString()
          })
          .eq('id', user.id);

        if (error) {
          messageDiv.textContent = 'Error: ' + error.message;
          messageDiv.className = 'message error';
        } else {
          messageDiv.textContent = 'Profile updated successfully!';
          messageDiv.className = 'message success';
          setTimeout(() => {
            messageDiv.textContent = '';
            messageDiv.className = 'message';
          }, 3000);
        }
      } catch (err) {
        messageDiv.textContent = 'Error: ' + err.message;
        messageDiv.className = 'message error';
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
      }
    });

    // Cancel button
    document.getElementById('cancel-btn').addEventListener('click', () => {
      window.location.href = 'dashboard.html';
    });

    // Change password
    document.getElementById('change-password-btn').addEventListener('click', async () => {
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const messageDiv = document.getElementById('password-message');

      if (!newPassword || !confirmPassword) {
        messageDiv.textContent = 'Please fill in both password fields';
        messageDiv.className = 'message error';
        return;
      }

      if (newPassword !== confirmPassword) {
        messageDiv.textContent = 'Passwords do not match';
        messageDiv.className = 'message error';
        return;
      }

      if (newPassword.length < 8) {
        messageDiv.textContent = 'Password must be at least 8 characters';
        messageDiv.className = 'message error';
        return;
      }

      const btn = document.getElementById('change-password-btn');
      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const user = await window.checkAuth();
        const { error } = await window.supabase.auth.updateUser({ password: newPassword });

        if (error) {
          messageDiv.textContent = 'Error: ' + error.message;
          messageDiv.className = 'message error';
        } else {
          messageDiv.textContent = 'Password updated successfully!';
          messageDiv.className = 'message success';
          document.getElementById('new-password').value = '';
          document.getElementById('confirm-password').value = '';
          setTimeout(() => {
            messageDiv.textContent = '';
            messageDiv.className = 'message';
          }, 3000);
        }
      } catch (err) {
        messageDiv.textContent = 'Error: ' + err.message;
        messageDiv.className = 'message error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });

    // Delete account
    document.getElementById('delete-account-btn').addEventListener('click', async () => {
      const confirmed = confirm('Are you sure you want to delete your account? This cannot be undone.');
      if (!confirmed) return;

      const doubleConfirmed = confirm('This will permanently delete your account and all associated data. Type DELETE to confirm.');
      if (!doubleConfirmed) return;

      const user = await window.checkAuth();
      if (!user) return;

      const messageDiv = document.getElementById('delete-message');
      const btn = document.getElementById('delete-account-btn');
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      try {
        // Delete user profile first
        const { error: profileError } = await window.supabase
          .from('user_profiles')
          .delete()
          .eq('id', user.id);

        if (profileError) throw profileError;

        // Note: Deleting the auth user requires admin API or a backend function
        // For now, we'll just sign out
        await window.signOut();
        
        messageDiv.textContent = 'Account deleted successfully. Redirecting...';
        messageDiv.className = 'message success';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (err) {
        messageDiv.textContent = 'Error: ' + err.message;
        messageDiv.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Delete Account';
      }
    });

    // Logout handler
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const result = await window.signOut();
      if (result.success) {
        window.location.href = 'login.html';
      }
    });

    // Load profile on page load
    window.addEventListener('load', loadProfile);
  </script>
</body>
</html>
