<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPLITWI$E - Live Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-control-geocoder/2.4.0/Control.Geocoder.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0a1f2e;
      color: #e0f7f7;
      overflow: hidden;
    }

    #map {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    header {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 31, 46, 0.95);
      backdrop-filter: blur(15px);
      padding: 1rem 2rem;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 12px;
      border: 1px solid rgba(32, 192, 192, 0.3);
      gap: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #20c0c0;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .back-btn, .logout-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e0f7f7;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .back-btn:hover, .logout-btn:hover {
      background: rgba(32,192,192,0.18);
      border-color: rgba(32,192,192,0.4);
      color: #20c0c0;
    }

    .market-panel {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: rgba(10, 31, 46, 0.97);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(32, 192, 192, 0.3);
      border-radius: 16px;
      padding: 1.5rem;
      width: 340px;
      max-height: 500px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .market-panel-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #20c0c0;
      margin-bottom: 1.2rem;
      border-bottom: 2px solid rgba(32, 192, 192, 0.3);
      padding-bottom: 1rem;
    }

    .market-selector {
      margin-bottom: 1.5rem;
    }

    .market-selector label {
      display: block;
      margin-bottom: 0.7rem;
      color: #b0e0e0;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .market-input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .market-input-group input {
      flex: 1;
      padding: 0.9rem;
      background: rgba(32, 192, 192, 0.1);
      border: 1px solid rgba(32, 192, 192, 0.3);
      border-radius: 8px;
      color: #e0f7f7;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
    }

    .market-input-group input:focus {
      outline: none;
      border-color: #20c0c0;
      box-shadow: 0 0 0 3px rgba(32,192,192,0.2);
    }

    .market-input-group button {
      padding: 0.9rem 1.2rem;
      background: #20c0c0;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s;
    }

    .market-input-group button:hover {
      background: #18a8a8;
      transform: translateY(-2px);
    }

    .preset-markets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .market-btn {
      padding: 0.9rem;
      background: rgba(32, 192, 192, 0.08);
      border: 1px solid rgba(32, 192, 192, 0.2);
      border-radius: 10px;
      color: #e0f7f7;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      font-size: 0.85rem;
    }

    .market-btn:hover {
      background: rgba(32, 192, 192, 0.15);
      border-color: #20c0c0;
      color: #20c0c0;
      transform: translateY(-2px);
    }

    .market-btn.active {
      background: #20c0c0;
      border-color: #20c0c0;
      color: white;
      box-shadow: 0 4px 12px rgba(32, 192, 192, 0.4);
    }

    .nearby-users {
      margin-top: 1.5rem;
    }

    .nearby-users-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #b0e0e0;
      margin-bottom: 1rem;
    }

    .user-item {
      background: rgba(32, 192, 192, 0.1);
      border: 1px solid rgba(32, 192, 192, 0.2);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .user-item:hover {
      background: rgba(32, 192, 192, 0.18);
      border-color: rgba(32, 192, 192, 0.4);
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(32, 192, 192, 0.2);
    }

    .user-item-avatar {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .user-item-name {
      font-weight: 600;
      color: #e0f7f7;
      margin-bottom: 0.3rem;
    }

    .user-item-market {
      font-size: 0.85rem;
      color: #20c0c0;
      margin-bottom: 0.3rem;
    }

    .user-item-distance {
      font-size: 0.8rem;
      color: #a0d0d0;
    }

    .map-controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 50;
    }

    .control-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #20c0c0;
      color: white;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(32,192,192,0.4);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      transform: scale(1.12);
      box-shadow: 0 12px 32px rgba(32,192,192,0.6);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: rgba(10, 31, 46, 0.98);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(32, 192, 192, 0.3);
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      font-size: 1.6rem;
      font-weight: 700;
      color: #20c0c0;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-modal {
      background: none;
      border: none;
      color: #e0f7f7;
      font-size: 1.8rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .close-modal:hover {
      color: #20c0c0;
      transform: rotate(90deg);
    }

    .user-profile {
      text-align: center;
      margin-bottom: 2rem;
    }

    .user-avatar-display {
      width: 120px;
      height: 120px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(32,192,192,0.2), rgba(32,192,192,0.05));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      border: 3px solid #20c0c0;
      box-shadow: 0 0 20px rgba(32, 192, 192, 0.3);
    }

    .user-profile h2 {
      color: #e0f7f7;
      margin-bottom: 0.5rem;
      font-size: 1.4rem;
    }

    .user-profile p {
      color: #a0d0d0;
      font-size: 0.95rem;
    }

    .group-info {
      background: rgba(32, 192, 192, 0.1);
      border: 1px solid rgba(32, 192, 192, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      color: #e0f7f7;
      font-size: 0.95rem;
    }

    .info-label {
      color: #a0d0d0;
    }

    .btn {
      width: 100%;
      background: #20c0c0;
      color: white;
      border: none;
      padding: 1.1rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      margin-top: 1rem;
    }

    .btn:hover {
      background: #18a8a8;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(32, 192, 192, 0.3);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #20c0c0;
      color: #20c0c0;
    }

    .btn-secondary:hover {
      background: #20c0c0;
      color: white;
    }

    /* Custom Marker Styles */
    .user-marker-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .user-marker-avatar {
      font-size: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 3px solid #20c0c0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .user-marker-label {
      position: absolute;
      top: -35px;
      background: rgba(32, 192, 192, 0.95);
      color: white;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(32, 192, 192, 0.4);
      border: 1px solid rgba(32, 192, 192, 0.5);
      letter-spacing: 0.5px;
    }

    .my-marker-avatar {
      font-size: 2.5rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #20c0c0, #10a0a0);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(32, 192, 192, 0.6);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(32, 192, 192, 0.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(32, 192, 192, 0.3);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(32, 192, 192, 0.5);
    }

    @media (max-width: 768px) {
      header {
        width: 95%;
        flex-direction: column;
        gap: 0.8rem;
        padding: 0.8rem 1.5rem;
      }

      .market-panel {
        width: calc(100% - 60px);
        left: 30px;
        right: 30px;
        max-height: 45vh;
      }

      .preset-markets {
        grid-template-columns: 1fr;
      }

      .control-btn {
        width: 60px;
        height: 60px;
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-control-geocoder/2.4.0/Control.Geocoder.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="location.js"></script>

  <div id="map"></div>

  <header>
    <div class="logo">🗺️ SPLITWI$E Live Map</div>
    <div class="header-actions">
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </div>
  </header>

  <div class="market-panel">
    <div class="market-panel-title">🛍️ Markets</div>
    
    <div class="market-selector">
      <label>Create Custom Market:</label>
      <div class="market-input-group">
        <input type="text" id="custom-market-input" placeholder="Tech Store, Fashion...">
        <button onclick="addCustomMarket()">+</button>
      </div>
    </div>

    <label style="color: #b0e0e0; font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 0.8rem;">Popular Markets:</label>
    <div class="preset-markets" id="preset-markets"></div>

    <div class="nearby-users">
      <div class="nearby-users-title">👥 Nearby Shoppers</div>
      <div id="nearby-users-list"></div>
    </div>
  </div>

  <div class="map-controls">
    <button class="control-btn" id="recenter-btn" title="My Location">📍</button>
    <button class="control-btn" id="refresh-btn" title="Refresh">🔄</button>
  </div>

  <div class="modal" id="user-modal">
    <div class="modal-content">
      <div class="modal-header">
        Connect
        <button class="close-modal" onclick="closeUserModal()">&times;</button>
      </div>
      
      <div class="user-profile">
        <div class="user-avatar-display" id="modal-avatar">🧑</div>
        <h2 id="modal-name">User Name</h2>
        <p id="modal-market">Market: Jumia</p>
      </div>

      <div class="group-info">
        <div style="font-weight: 600; color: #b0e0e0; margin-bottom: 1rem;">Details</div>
        <div class="info-row">
          <span class="info-label">Distance:</span>
          <span id="modal-distance">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Market:</span>
          <span id="modal-market-detail">--</span>
        </div>
      </div>

      <button class="btn" id="create-group-btn" onclick="createGroupWithUser()">
        ✨ Create Shopping Group
      </button>
      <button class="btn btn-secondary" onclick="closeUserModal()">
        Cancel
      </button>
    </div>
  </div>

  <script>
    let map;
    let userMarker;
    let currentUser = null;
    let selectedMarket = null;
    let userMarkersMap = {};
    let selectedUserData = null;
    let customMarkets = [];

    const PRESET_MARKETS = [
      { id: 'jumia', name: 'Jumia', emoji: '🛒' },
      { id: 'konga', name: 'Konga', emoji: '🛍️' },
      { id: 'amazon', name: 'Amazon', emoji: '📦' },
      { id: 'aliexpress', name: 'AliExpress', emoji: '🎁' },
      { id: 'ebay', name: 'eBay', emoji: '💳' },
      { id: 'shopify', name: 'Shopify', emoji: '🏪' },
      { id: 'instagram', name: 'Instagram', emoji: '📱' },
    ];

    function initializePresetMarkets() {
      const container = document.getElementById('preset-markets');
      container.innerHTML = '';
      
      PRESET_MARKETS.forEach(market => {
        const btn = document.createElement('button');
        btn.className = 'market-btn';
        btn.textContent = `${market.emoji} ${market.name}`;
        btn.onclick = () => selectMarket(market.id, market.name);
        if (selectedMarket === market.id) {
          btn.classList.add('active');
        }
        container.appendChild(btn);
      });

      customMarkets.forEach(market => {
        const btn = document.createElement('button');
        btn.className = 'market-btn';
        btn.textContent = `📌 ${market}`;
        btn.onclick = () => selectMarket(market, market);
        if (selectedMarket === market) {
          btn.classList.add('active');
        }
        container.appendChild(btn);
      });
    }

    async function selectMarket(marketId, marketName) {
      selectedMarket = marketId;
      
      try {
        const { error } = await window.supabase
          .from('user_profiles')
          .update({
            current_market: marketId,
            current_market_name: marketName,
            updated_at: new Date().toISOString()
          })
          .eq('id', currentUser.id);

        if (error) throw error;

        initializePresetMarkets();
        updateNearbyUsers();
        updateMapMarkers();
      } catch (error) {
        console.error('Error updating market:', error);
        alert('Error selecting market');
      }
    }

    function addCustomMarket() {
      const input = document.getElementById('custom-market-input');
      const market = input.value.trim();
      
      if (!market) {
        alert('Please enter a market name');
        return;
      }

      if (!customMarkets.includes(market)) {
        customMarkets.push(market);
      }

      selectMarket(market, market);
      input.value = '';
      initializePresetMarkets();
    }

    async function checkUserLoggedIn() {
      const user = await window.checkAuth();
      if (!user) {
        window.location.href = 'login.html';
        return null;
      }
      return user;
    }

    function initializeMap(lat, lng) {
      // High quality tile layer
      map = L.map('map', {
        maxZoom: 22,
        minZoom: 2,
        zoomAnimation: true,
        fadeAnimation: true,
        markerZoomAnimation: true
      }).setView([lat, lng], 16);
      
     L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© CartoDB',
  maxZoom: 22,
  maxNativeZoom: 19
}).addTo(map);

      // Add satellite layer option
      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenTopoMap',
        maxZoom: 17,
        maxNativeZoom: 17
      });

      // My location marker with better styling
      const myMarkerHTML = `<div class="my-marker-avatar">${currentUser.avatar || '🧑'}</div>`;
      const myMarkerIcon = L.divIcon({
        html: myMarkerHTML,
        iconSize: [60, 60],
        className: 'my-custom-marker'
      });

      userMarker = L.marker([lat, lng], {
        icon: myMarkerIcon,
        zIndexOffset: 1000
      }).addTo(map);

      userMarker.bindPopup(`<div style="text-align: center; color: #e0f7f7;"><div style="font-size: 2rem;">${currentUser.avatar || '🧑'}</div><strong>${currentUser.full_name}</strong><br>You are here</div>`);

      // Add zoom controls
      L.control.zoom({ position: 'bottomright' }).addTo(map);
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = 
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    async function updateNearbyUsers() {
      if (!selectedMarket) {
        document.getElementById('nearby-users-list').innerHTML = '<p style="color: #a0d0d0; font-size: 0.9rem;">Select a market to see shoppers</p>';
        return;
      }

      try {
        const { data: users, error } = await window.supabase
          .from('user_profiles')
          .select('*')
          .eq('current_market', selectedMarket)
          .neq('id', currentUser.id);

        if (error) throw error;

        if (!users || users.length === 0) {
          document.getElementById('nearby-users-list').innerHTML = '<p style="color: #a0d0d0; font-size: 0.9rem;">No nearby shoppers yet. Be the first!</p>';
          return;
        }

        const nearbyUsers = users.filter(user => {
          if (!user.latitude || !user.longitude) return false;
          const distance = calculateDistance(
            currentUser.latitude,
            currentUser.longitude,
            user.latitude,
            user.longitude
          );
          return distance < 10;
        }).sort((a, b) => {
          const distA = calculateDistance(currentUser.latitude, currentUser.longitude, a.latitude, a.longitude);
          const distB = calculateDistance(currentUser.latitude, currentUser.longitude, b.latitude, b.longitude);
          return distA - distB;
        });

        let html = '';
        nearbyUsers.forEach(user => {
          const distance = calculateDistance(
            currentUser.latitude,
            currentUser.longitude,
            user.latitude,
            user.longitude
          );
          
          html += `
            <div class="user-item" onclick="openUserModal('${user.id}', '${user.full_name}', '${user.avatar || '🧑'}', ${user.latitude}, ${user.longitude}, ${distance})">
              <div class="user-item-avatar">${user.avatar || '🧑'}</div>
              <div class="user-item-name">${user.full_name}</div>
              <div class="user-item-market">${user.current_market_name || selectedMarket}</div>
              <div class="user-item-distance">📍 ${distance.toFixed(2)} km away</div>
            </div>
          `;
        });

        document.getElementById('nearby-users-list').innerHTML = html;
      } catch (error) {
        console.error('Error fetching nearby users:', error);
      }
    }

    async function updateMapMarkers() {
      try {
        const { data: allUsers, error } = await window.supabase
          .from('user_profiles')
          .select('*')
          .not('current_market', 'is', null);

        if (error) throw error;

        Object.values(userMarkersMap).forEach(markerObj => {
          map.removeLayer(markerObj.marker);
        });
        userMarkersMap = {};

        allUsers.forEach(user => {
          if (!user.latitude || !user.longitude || !user.current_market) return;
          if (user.id === currentUser.id) return;

          const avatar = user.avatar || '🧑';
          const marketName = user.current_market_name || user.current_market;
          
          // Create Snapchat-style marker
          const markerHTML = `
            <div class="user-marker-container">
              <div class="user-marker-label">${marketName}</div>
              <div class="user-marker-avatar">${avatar}</div>
            </div>
          `;

          const customIcon = L.divIcon({
            html: markerHTML,
            iconSize: [70, 100],
            className: 'custom-user-marker',
            popupAnchor: [0, -50]
          });

          const marker = L.marker([user.latitude, user.longitude], {
            icon: customIcon
          }).addTo(map);

          const distance = calculateDistance(
            currentUser.latitude,
            currentUser.longitude,
            user.latitude,
            user.longitude
          );

          marker.bindPopup(`
            <div style="color: #e0f7f7; font-family: Poppins; text-align: center; min-width: 200px;">
              <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">${avatar}</div>
              <div style="font-weight: 600; margin-bottom: 0.3rem; font-size: 1.1rem;">${user.full_name}</div>
              <div style="color: #20c0c0; margin-bottom: 0.3rem; font-weight: 600;">${marketName}</div>
              <div style="color: #a0d0d0; font-size: 0.9rem;">📍 ${distance.toFixed(2)} km away</div>
            </div>
          `);

          marker.on('click', () => {
            openUserModal(user.id, user.full_name, avatar, user.latitude, user.longitude, distance);
          });

          userMarkersMap[user.id] = { marker, user };
        });
      } catch (error) {
        console.error('Error updating map markers:', error);
      }
    }

    function openUserModal(userId, fullName, avatar, lat, lng, distance) {
      selectedUserData = { userId, fullName, avatar, lat, lng, distance };
      
      document.getElementById('modal-avatar').textContent = avatar;
      document.getElementById('modal-name').textContent = fullName;
      document.getElementById('modal-market').textContent = `${avatar} ${fullName}`;
      document.getElementById('modal-distance').textContent = `${distance.toFixed(2)} km`;
      document.getElementById('modal-market-detail').textContent = selectedMarket;
      
      document.getElementById('user-modal').classList.add('active');
    }

    function closeUserModal() {
      document.getElementById('user-modal').classList.remove('active');
      selectedUserData = null;
    }

    async function createGroupWithUser() {
      if (!selectedUserData || !selectedMarket) {
        alert('Missing user or market data');
        return;
      }

      try {
        const { data: group, error: groupError } = await window.supabase
          .from('groups')
          .insert([{
            creator_id: currentUser.id,
            group_name: `${currentUser.full_name} & ${selectedUserData.fullName} - ${selectedMarket}`,
            store_url: '',
            status: 'active'
          }])
          .select()
          .single();

        if (groupError) throw groupError;

        await window.supabase.from('group_members').insert([
          { group_id: group.id, member_id: currentUser.id },
          { group_id: group.id, member_id: selectedUserData.userId }
        ]);

        alert(`✓ Group created! You can now chat with ${selectedUserData.fullName}`);
        
        setTimeout(() => {
          closeUserModal();
          window.location.href = 'groups.html';
        }, 1500);

      } catch (error) {
        console.error('Error creating group:', error);
        alert('Error creating group: ' + error.message);
      }
    }

    document.getElementById('recenter-btn').addEventListener('click', () => {
      if (currentUser && currentUser.latitude && currentUser.longitude) {
        map.setView([currentUser.latitude, currentUser.longitude], 16);
        map.flyTo([currentUser.latitude, currentUser.longitude], 16, { duration: 1 });
      }
    });

    document.getElementById('refresh-btn').addEventListener('click', () => {
      updateMapMarkers();
      updateNearbyUsers();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      const result = await window.signOut();
      if (result.success) {
        window.location.href = 'login.html';
      }
    });

    async function initializePage() {
      const user = await checkUserLoggedIn();
      if (!user) return;

      try {
        const { data: profile, error } = await window.supabase
          .from('user_profiles')
          .select('*')
          .eq('id', user.id)
          .single();

        if (error) throw error;

        currentUser = profile;
        selectedMarket = profile.current_market || null;

        if (profile.latitude && profile.longitude) {
          initializeMap(profile.latitude, profile.longitude);
        } else {
          const locationResult = await window.updateUserLocation();
          if (locationResult.success) {
            initializeMap(locationResult.location.latitude, locationResult.location.longitude);
          }
        }

        initializePresetMarkets();
        updateNearbyUsers();
        updateMapMarkers();

        setInterval(() => {
          updateMapMarkers();
          updateNearbyUsers();
        }, 5000);

      } catch (error) {
        console.error('Error initializing page:', error);
        alert('Error loading map: ' + error.message);
      }
    }

    initializePage();
  </script>
</body>
</html>
